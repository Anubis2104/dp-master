{% extends 'base.html' %}

{% block title %}Đăng nhập - DP Master{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <div class="text-center mb-4">
        <h2>Đăng nhập</h2>
        <p style="color: var(--text-muted);">Tiếp tục lộ trình học của bạn</p>
    </div>
    
    <form method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        {% if error %}
        <div style="color: red; text-align: center; margin-bottom: 1rem;">{{ error }}</div>
        {% endif %}
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" placeholder="Nhập username" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" placeholder="Nhập mật khẩu" required>
        </div>
        
        <div style="text-align: right; margin-top: -0.8rem; margin-bottom: 1.2rem;">
            <a href="/forgot-password" style="font-size: 0.85rem; color: var(--primary); text-decoration: none;">Quên mật khẩu?</a>
        </div>
        
        <button type="submit" class="btn btn-block">Đăng nhập</button>
        
        <div class="text-center mt-4">
            <p style="font-size: 0.9rem;">Chưa có tài khoản? <a href="/register" style="color: var(--primary); text-decoration: none;">Đăng ký ngay</a></p>
        </div>
    </form>
</div>
{% endblock %}
