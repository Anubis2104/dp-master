{% extends 'base.html' %}

{% block title %}Xác thực 2 bước - DP Master{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 4rem auto;">
    <div class="text-center mb-4">
        <div style="width: 56px; height: 56px; background: linear-gradient(135deg, #2563eb, #1d4ed8); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
        <h2 style="margin-bottom: 0.5rem;">Xác thực 2 bước</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem;">Nhập mã xác thực từ ứng dụng của bạn</p>
    </div>
    
    <form method="POST" action="/verify-2fa">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        {% if error %}
        <div class="alert alert-error" style="margin-bottom: 1.5rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
            {{ error }}
        </div>
        {% endif %}

        <div class="form-group">
            <label>Mã xác thực (OTP)</label>
            <input type="text" name="otp_code" placeholder="Nhập mã 6 chữ số" required 
                   maxlength="6" pattern="[0-9]{6}" autocomplete="one-time-code"
                   style="text-align: center; font-size: 1.5rem; letter-spacing: 8px; font-weight: 600;" autofocus>
        </div>
        
        <button type="submit" class="btn btn-block">Xác nhận</button>
        
        <div class="text-center mt-4">
            <a href="/login" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Quay lại đăng nhập</a>
        </div>
    </form>
</div>
{% endblock %}
